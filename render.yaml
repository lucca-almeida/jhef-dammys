services:
  - type: web
    name: jhef-dammys-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run deploy:build
    startCommand: npm run deploy:start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jhef-dammys-db
          property: connectionString
      - key: PORT
        value: 3001
      - key: FRONTEND_URL
        sync: false
      - key: AUTH_SECRET
        generateValue: true
      - key: ADMIN_NAME
        value: Jhef
      - key: ADMIN_EMAIL
        value: admin@jhefdammys.local
      - key: ADMIN_PASSWORD
        sync: false

databases:
  - name: jhef-dammys-db
    databaseName: churrasco_manager
    user: postgres
